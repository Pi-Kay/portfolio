<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Petra Kühnle — Technical UX for audio & engineering software. Berlin / Remote.">
    <title>Petra Kühnle — Technical UX · Audio & Engineering Software</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f5f3ef;
            --ink: #2a2824;
            --ink-soft: #4a4641;
            --ink-muted: #7a756d;
            --ink-faint: #9a948b;
            --hairline: #d9d4ca;
            --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.6;
            padding: 80px 24px;
            font-weight: 300;
        }
        .container { max-width: 680px; margin: 0 auto; }
        header { margin-bottom: 64px; }
        .section-label {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--ink-faint);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            margin-bottom: 22px;
        }
        nav a {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: baseline;
            text-decoration: none;
            color: var(--ink);
        }
        @media (max-width: 600px) {
            nav a { grid-template-columns: 1fr; gap: 4px; }
            .project-date { text-align: left; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- header content same as before -->
        <header>
            <!-- ... your header ... -->
        </header>

        <main>
            <p class="section-label">Selected work</p>
            <nav>
                <ul style="list-style:none">
                    <!-- your project items -->
                </ul>
            </nav>
        </main>
    </div>
</body>
</html>
