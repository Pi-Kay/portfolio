<!DOCTYPE html>
<html><head><title>Berlin Sound Map • Sonifier</title></head>
<body style="font-family:sans-serif; margin:20px; background:#f8f8f8">
<h1>Berlin Position Data — Noise Levels</h1>
<svg id="map" width="620" height="420" style="background:#e0f0ff; border:3px solid #333; display:block;">
  <!-- Simple Berlin map background -->
  <rect x="60" y="60" width="500" height="300" fill="#c8e0ff" stroke="#333" stroke-width="8"/>
  <text x="310" y="40" text-anchor="middle" font-size="24" fill="#222">BERLIN</text>
  
  <!-- Data points -->
  <!-- Mitte -->
  <circle cx="310" cy="160" r="18" fill="#ff0066" stroke="#fff" stroke-width="4"/>
  <text x="310" y="155" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Mitte<br>68 dB</text>
  
  <!-- Kreuzberg -->
  <circle cx="420" cy="240" r="18" fill="#ff0066" stroke="#fff" stroke-width="4"/>
  <text x="420" y="235" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Kreuzberg<br>75 dB</text>
  
  <!-- Prenzlauer Berg -->
  <circle cx="280" cy="100" r="18" fill="#00cc88" stroke="#fff" stroke-width="4"/>
  <text x="280" y="95" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Prenzlauer<br>62 dB</text>
  
  <!-- Charlottenburg -->
  <circle cx="140" cy="180" r="18" fill="#00cc88" stroke="#fff" stroke-width="4"/>
  <text x="140" y="175" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Charlottenburg<br>64 dB</text>
  
  <!-- Neukölln -->
  <circle cx="380" cy="290" r="18" fill="#ffaa00" stroke="#fff" stroke-width="4"/>
  <text x="380" y="285" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Neukölln<br>71 dB</text>
</svg>

<button onclick="sonifyAll()" style="margin-top:15px; padding:12px 24px; font-size:18px; background:#ff0066; color:white; border:none; border-radius:8px; cursor:pointer">▶ Sonify Berlin Map</button>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const points = [
  {name:"Mitte", val:68},
  {name:"Kreuzberg", val:75},
  {name:"Prenzlauer Berg", val:62},
  {name:"Charlottenburg", val:64},
  {name:"Neukölln", val:71}
];

function sonifyAll() {
  points.forEach((p, i) => {
    setTimeout(() => {
      const osc = ctx.createOscillator();
      osc.frequency.value = 180 + p.val * 6;   // pitch = value
      const gain = ctx.createGain();
      gain.gain.value = 0.6;
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.45);
    }, i * 420);
  });
}
</script>
</body></html>
